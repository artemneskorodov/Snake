name: Build CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: configure
      run: ./configure
    - name: create dir
      run: mkdir -p build
    - name: configure cmake
      run: cmake -B build
    - name: make
      run: cmake --build build
